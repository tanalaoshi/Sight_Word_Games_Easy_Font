  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sight Word Airplane Adventure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            /* Updated font-family rule */
            font-family: 'Comic Neue', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 80vh;
            /* Changed to a deeper sky blue gradient for a high-flying look */
            background: linear-gradient(to bottom, #4ca1af 0%, #c4e0e5 70%, #9bc760 70%, #83b641 100%);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #control-panel {
            width: 100vw;
            height: 20vh;
            background-color: #ffffff;
            box-sizing: border-box;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            border-top: 4px solid #4a7714;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
        textarea {
            width: 40vw;
            height: 10vh;
            font-family: 'Comic Neue', sans-serif;
            font-size: 16px;
            padding: 5px;
            border: 2px solid #ccc;
            border-radius: 5px;
            resize: none;
        }
        button {
            font-family: 'Comic Neue', sans-serif;
            font-size: 20px;
            font-weight: bold;
            padding: 15px 30px;
            background-color: #e65100; /* Energetic Orange Button */
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 0 #a33600;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<div id="control-panel">
    <div class="input-group">
        <label for="wordList">Custom Words (comma-separated):</label>
        <textarea id="wordList">and, OK, on,</textarea>
    </div>
    <button onclick="restartGame()">Update & Restart</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Game State variables
let words = [];
let targetWord = '';
let timeLeft = 60;
let correctTaps = 0;
let incorrectTaps = 0;
let airplanes = [];
let particles = [];
let gameInterval, timerInterval, musicInterval;
let gameOver = false;
let gameWon = false;

// Physics parameters
const UNIFORM_SPEED = 2.5; // Slightly faster pace for planes
const LANES = 4;
let laneLastSpawnX = Array(LANES).fill(0); 

// --- AUDIO & SPEECH ENGINES ---
let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function speakWord(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        const utterance = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(v => 
            v.lang.startsWith('en') && 
            (v.name.includes('Samantha') || v.name.includes('Google') || v.name.includes('Natural'))
        ) || voices.find(v => v.lang.startsWith('en'));
        
        if (preferredVoice) utterance.voice = preferredVoice;
        utterance.rate = 0.85;  
        utterance.pitch = 1.15; 
        window.speechSynthesis.speak(utterance);
    }
}

function playTone(freq, type, duration, startTimeOffset = 0) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTimeOffset);
    gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime + startTimeOffset);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + startTimeOffset + duration);
    
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    osc.start(audioCtx.currentTime + startTimeOffset);
    osc.stop(audioCtx.currentTime + startTimeOffset + duration);
}

function playIncorrectSound() {
    playTone(130.81, 'sawtooth', 0.15); 
    playTone(130.81, 'sawtooth', 0.15, 0.18); 
}

function playWinSound() {
    const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, index) => {
        playTone(freq, 'triangle', 0.3, index * 0.1);
    });
}
function playLoseSound() {
    const notes = [220.00, 207.65, 196.00, 174.61];
    notes.forEach((freq, index) => {
        playTone(freq, 'sawtooth', 0.4, index * 0.25);
    });
}

function startAdventureMusic() {
    clearInterval(musicInterval);
    let beat = 0;
    const adventureBass = [261.63, 329.63, 392.00, 349.23]; // C4, E4, G4, F4
    
    musicInterval = setInterval(() => {
        if (gameOver) return;
        const currentNote = adventureBass[beat % adventureBass.length];
        playTone(currentNote, 'triangle', 0.2); 
        beat++;
    }, 320); 
}

if ('speechSynthesis' in window) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
// --- END AUDIO ENGINES ---

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.8;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- NEW AIRPLANE VEHICLE ENGINE ---
class Airplane {
    constructor(word, lane) {
        this.word = word.toLowerCase();
        this.lane = lane;
        this.width = 150;
        this.height = 70;
        this.x = canvas.width + this.width;
        
        const skyHeight = canvas.height * 0.6;
        const laneHeight = skyHeight / LANES;
        this.y = (canvas.height * 0.15) + (lane * laneHeight);
        
        this.isShaking = false;
        this.shakeTimer = 0;
        this.flashRed = false;
    }

    draw() {
        ctx.save();
        let displayX = this.x;
        if (this.isShaking) {
            displayX += Math.sin(Date.now() * 0.05) * 8; 
        }

        // Setup colors based on touch state
        let planeColor = this.flashRed ? '#ff4e4e' : '#e65100'; // Red flash vs Bold Red/Orange
        let wingColor = this.flashRed ? '#ff9999' : '#ffffff';

        // 1. Draw Tail Fin
        ctx.fillStyle = planeColor;
        ctx.beginPath();
        ctx.moveTo(displayX + 110, this.y);
        ctx.lineTo(displayX + 130, this.y - 25);
        ctx.lineTo(displayX + 140, this.y - 25);
        ctx.lineTo(displayX + 125, this.y + 15);
        ctx.closePath();
        ctx.fill();

        // 2. Main Airplane Fuselage
        ctx.beginPath();
        ctx.ellipse(displayX + 70, this.y, 60, 20, 0, 0, Math.PI * 2);
        ctx.fill();

        // 3. Draw Propeller Nose cone
        ctx.fillStyle = '#333333';
        ctx.beginPath();
        ctx.arc(displayX + 10, this.y, 8, Math.PI * 0.5, Math.PI * 1.5);
        ctx.fill();

        // 4. White Wings
        ctx.fillStyle = wingColor;
        ctx.beginPath();
        ctx.ellipse(displayX + 55, this.y + 5, 12, 35, Math.PI / 6, 0, Math.PI * 2);
        ctx.fill();

        // 5. Draw Lowercase Word directly above/inside the body cockpit
        ctx.fillStyle = '#000000';
        // Updated Canvas font to Comic Neue
        ctx.font = 'bold 22px "Comic Neue", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        // White backdrop bubble for the word to maximize letter readability
        ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
        ctx.fillRect(displayX + 30, this.y - 14, 70, 26);
        
        ctx.fillStyle = '#000000';
        ctx.fillText(this.word, displayX + 65, this.y);
        
        ctx.restore();
    }

    update() {
        this.x -= UNIFORM_SPEED;

        if (this.isShaking) {
            this.shakeTimer -= 16;
            if (this.shakeTimer <= 0) {
                this.isShaking = false;
                this.flashRed = false;
            }
        }
    }
}

class Particle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;
        this.radius = Math.random() * 4 + 2;
        this.alpha = 1;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = '#ffcc00'; // Golden spark explosions for airplanes
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 0.02;
    }
}

function spawnAirplane() {
    if (gameOver) return;
    
    const lane = Math.floor(Math.random() * LANES);
    const spaceRequired = canvas.width - 240; 

    if (laneLastSpawnX[lane] > spaceRequired) return; 

    const isTarget = Math.random() < 0.4;
    const word = isTarget ? targetWord : words[Math.floor(Math.random() * words.length)];
    
    const newPlane = new Airplane(word, lane);
    airplanes.push(newPlane);
    laneLastSpawnX[lane] = canvas.width + newPlane.width; 
}

function getAccuracy() {
    const total = correctTaps + incorrectTaps;
    if (total === 0) return 100;
    return Math.round((correctTaps / total) * 100);
}

function drawUI() {
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 5;
    ctx.lineJoin = 'round';
    ctx.fillRect(30, 20, 250, 70);
    ctx.strokeRect(30, 20, 250, 70);

    ctx.fillStyle = '#000000';
    // Updated Target Box font to Comic Neue
    ctx.font = 'bold 42px "Comic Neue", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(targetWord, 155, 68);

    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
    ctx.fillRect(canvas.width - 280, 20, 250, 110);
    ctx.strokeRect(canvas.width - 280, 20, 250, 110);

    ctx.fillStyle = '#333333';
    // Updated HUD panel font to Comic Neue
    ctx.font = 'bold 18px "Comic Neue", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`Timer: ${timeLeft}s`, canvas.width - 260, 50);
    ctx.fillText(`Hits: ${correctTaps}   Wrong: ${incorrectTaps}`, canvas.width - 260, 80);
    
    const acc = getAccuracy();
    ctx.fillStyle = acc >= 90 ? '#2e7d32' : '#c62828';
    ctx.fillText(`Accuracy: ${acc}% (Need 90%)`, canvas.width - 260, 110);
}

function drawEndScreen() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#ffffff';
    // Updated End Screen Main font to Comic Neue
    ctx.font = 'bold 50px "Comic Neue", sans-serif';
    ctx.textAlign = 'center';
    
    if (gameWon) {
        ctx.fillStyle = '#4eff4e';
        ctx.fillText("🎉 Sky Explorer Wins! 🎉", canvas.width / 2, canvas.height / 2 - 20);
    } else {
        ctx.fillStyle = '#ff4e4e';
        ctx.fillText("Try Again!", canvas.width / 2, canvas.height / 2 - 20);
    }

    ctx.fillStyle = '#ffffff';
    // Updated End Screen Score font to Comic Neue
    ctx.font = '30px "Comic Neue", sans-serif';
    ctx.fillText(`Final Accuracy: ${getAccuracy()}%`, canvas.width / 2, canvas.height / 2 + 40);
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < LANES; i++) {
        laneLastSpawnX[i] = 0; 
    }

    for (let i = airplanes.length - 1; i >= 0; i--) {
        let plane = airplanes[i];
        plane.update();
        plane.draw();

        if (plane.x > laneLastSpawnX[plane.lane]) {
            laneLastSpawnX[plane.lane] = plane.x;
        }

        if (plane.x < -plane.width) {
            airplanes.splice(i, 1);
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].alpha <= 0) particles.splice(i, 1);
    }

    drawUI();

    if (gameOver) {
        drawEndScreen();
    } else {
        requestAnimationFrame(gameLoop);
    }
}

function handleInput(clientX, clientY) {
    initAudio(); 
    if (gameOver) return;

    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;

    for (let i = airplanes.length - 1; i >= 0; i--) {
        let plane = airplanes[i];
        if (x >= plane.x && x <= plane.x + plane.width && y >= plane.y - 35 && y <= plane.y + 35) {
            if (plane.word === targetWord) {
                correctTaps++;
                speakWord(targetWord); 
                for (let p = 0; p < 15; p++) {
                    particles.push(new Particle(plane.x + 65, plane.y));
                }
                airplanes.splice(i, 1);
            } else {
                if (!plane.isShaking) {
                    incorrectTaps++;
                    playIncorrectSound(); 
                    plane.isShaking = true;
                    plane.shakeTimer = 500;
                    plane.flashRed = true;
                }
            }
            break; 
        }
    }
}

canvas.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY));
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    handleInput(touch.clientX, touch.clientY);
}, { passive: false });

function restartGame() {
    initAudio(); 
    clearInterval(gameInterval);
    clearInterval(timerInterval);

    const rawInput = document.getElementById('wordList').value;
    words = rawInput.split(',').map(w => w.trim().toLowerCase()).filter(w => w.length > 0);
    
    if (words.length === 0) words = ['the'];
    
    targetWord = words[Math.floor(Math.random() * words.length)];
    
    setTimeout(() => { speakWord(targetWord); }, 100);

    timeLeft = 60;
    correctTaps = 0;
    incorrectTaps = 0;
    airplanes = [];
    particles = [];
    gameOver = false;
    gameWon = false;
    laneLastSpawnX = Array(LANES).fill(0);

    gameInterval = setInterval(spawnAirplane, 1400); // Adjusted spawn window
    startAdventureMusic(); 

    timerInterval = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
            gameOver = true;
            gameWon = getAccuracy() >= 90;
            clearInterval(timerInterval);
            clearInterval(gameInterval);
            clearInterval(musicInterval);
            
            if (gameWon) {
                playWinSound();
            } else {
                playLoseSound();
            }
        }
    }, 1000);

    requestAnimationFrame(gameLoop);
}

restartGame();
</script>

</body>
