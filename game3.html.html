<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sight Word Orchard - Tree Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: 'Comic Neue', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        /* Low Profile Dark Header Bar at the very top */
        #header-bar {
            background-color: #1e293b;
            color: #f8fafc;
            height: 5vh;
            min-height: 35px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 2px solid #0f172a;
        }
        #header-bar .hud-item {
            display: flex;
            gap: 15px;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 75vh;
            min-height: 365px;
            background: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 50%, #d4fc79 85%, #96e6a1 100%);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #control-panel {
            width: 100vw;
            height: 20vh;
            background-color: #ffffff;
            box-sizing: border-box;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            border-top: 4px solid #52a447;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
        textarea {
            width: 40vw;
            height: 10vh;
            font-family: 'Comic Neue', sans-serif;
            font-size: 16px;
            padding: 5px;
            border: 2px solid #ccc;
            border-radius: 5px;
            resize: none;
        }
        button {
            font-family: 'Comic Neue', sans-serif;
            font-size: 20px;
            font-weight: bold;
            padding: 15px 30px;
            background-color: #d32f2f; 
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 0 #9a0007;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>
</head>
<body>

<header id="header-bar">
    <div id="timer-text">Timer: 60s</div>
    <div class="hud-item">
        <span id="score-text">Hits: 0 | Wrong: 0</span>
        <span id="accuracy-text">Accuracy: 100% (Need 90%)</span>
    </div>
</header>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<div id="control-panel">
    <div class="input-group">
        <label for="wordList">Custom Words (comma-separated):</label>
        <textarea id="wordList">a, on, and</textarea>
    </div>
    <button onclick="restartGame()">Update & Restart</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let words = [];
let targetWord = '';
let timeLeft = 60;
let correctTaps = 0;
let incorrectTaps = 0;
let apples = [];
let particles = [];
let gameInterval, timerInterval, musicInterval;
let gameOver = false;
let gameWon = false;

const UNIFORM_SPEED = 1.1; 
const LANES = 5; 
let laneLastSpawnY = Array(LANES).fill(0); 

// --- AUDIO & SPEECH ENGINES ---
let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function speakWord(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        
        let textToSpeak = text;
        if (text.toLowerCase().trim() === 'a') {
            textToSpeak = 'ah'; 
        }
        
        const utterance = new SpeechSynthesisUtterance(textToSpeak);
        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(v => 
            v.lang.startsWith('en') && 
            (v.name.includes('Samantha') || v.name.includes('Google') || v.name.includes('Natural'))
        ) || voices.find(v => v.lang.startsWith('en'));
         
        if (preferredVoice) utterance.voice = preferredVoice;
        utterance.rate = 0.85;  
        utterance.pitch = 1.15; 
        window.speechSynthesis.speak(utterance);
    }
}

function playUkeNote(freq, duration, startTimeOffset = 0, volume = 0.04) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
     
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTimeOffset);
     
    gainNode.gain.setValueAtTime(volume, audioCtx.currentTime + startTimeOffset);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + startTimeOffset + duration);
     
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
     
    osc.start(audioCtx.currentTime + startTimeOffset);
    osc.stop(audioCtx.currentTime + startTimeOffset + duration);
}

function playIncorrectSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(130.81, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
}

function playWinSound() {
    const notes = [261.63, 329.63, 392.00, 523.25];
    notes.forEach((freq, index) => {
        playUkeNote(freq, 0.4, index * 0.08, 0.1);
    });
}

function playLoseSound() {
    const notes = [220.00, 196.00, 174.61];
    notes.forEach((freq, index) => {
        playUkeNote(freq, 0.5, index * 0.2, 0.1);
    });
}

function startUkuleleMusic() {
    clearInterval(musicInterval);
    let beat = 0;
    const chords = [
        [261.63, 329.63, 392.00, 440.00], 
        [196.00, 293.66, 392.00, 440.00], 
        [220.00, 329.63, 440.00, 523.25], 
        [174.61, 261.63, 349.23, 440.00]  
    ];
     
    musicInterval = setInterval(() => {
        if (gameOver) return;
        const currentChord = chords[beat % chords.length];
        currentChord.forEach((noteFreq, stringIndex) => {
            playUkeNote(noteFreq, 0.6, stringIndex * 0.025, 0.04);
        });
        beat++;
    }, 800); 
}

if ('speechSynthesis' in window) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.75;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function drawOrchardBackground() {
    const centerX = canvas.width / 2;

    ctx.fillStyle = '#5c4033'; 
    ctx.beginPath();
    ctx.moveTo(centerX - 45, 0);
    ctx.lineTo(centerX - 55, canvas.height - 100);
    ctx.quadraticCurveTo(centerX - 120, canvas.height, centerX - 160, canvas.height);
    ctx.lineTo(centerX + 160, canvas.height);
    ctx.quadraticCurveTo(centerX + 120, canvas.height, centerX + 55, canvas.height - 100);
    ctx.lineTo(centerX + 45, 0);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = '#453026';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(centerX - 10, 80); ctx.lineTo(centerX - 15, canvas.height - 80);
    ctx.moveTo(centerX + 15, 40); ctx.lineTo(centerX + 20, canvas.height - 120);
    ctx.stroke();

    ctx.fillStyle = '#3e8e41'; 
    ctx.beginPath();
    ctx.arc(centerX, -20, 160, 0, Math.PI * 2);
    ctx.arc(centerX - 200, -40, 140, 0, Math.PI * 2);
    ctx.arc(centerX + 200, -40, 140, 0, Math.PI * 2);
    ctx.arc(centerX - 400, -50, 150, 0, Math.PI * 2);
    ctx.arc(centerX + 400, -50, 150, 0, Math.PI * 2);
    ctx.arc(50, -30, 120, 0, Math.PI * 2);
    ctx.arc(canvas.width - 50, -30, 120, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#52a447'; 
    ctx.beginPath();
    ctx.arc(centerX - 100, -60, 110, 0, Math.PI * 2);
    ctx.arc(centerX + 100, -60, 110, 0, Math.PI * 2);
    ctx.arc(centerX - 300, -60, 120, 0, Math.PI * 2);
    ctx.arc(centerX + 300, -60, 120, 0, Math.PI * 2);
    ctx.fill();
}

class Apple {
    constructor(word, lane) {
        this.word = word.toLowerCase();
        this.lane = lane;
        this.radius = 35;
        const columnWidth = canvas.width / LANES;
        this.x = (columnWidth * lane) + (columnWidth / 2);
        this.y = -this.radius * 2;
        this.isShaking = false;
        this.shakeTimer = 0;
        this.flashRed = false;
    }

    draw() {
        ctx.save();
        let displayX = this.x;
        if (this.isShaking) {
            displayX += Math.sin(Date.now() * 0.05) * 8; 
        }

        ctx.strokeStyle = '#6d4c41';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(displayX, this.y - this.radius + 5);
        ctx.quadraticCurveTo(displayX + 8, this.y - this.radius - 12, displayX + 12, this.y - this.radius - 10);
        ctx.stroke();

        ctx.fillStyle = '#4abc3e';
        ctx.beginPath();
        ctx.ellipse(displayX + 8, this.y - this.radius - 8, 4, 8, Math.PI / 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = this.flashRed ? '#ff4e4e' : '#d32f2f';
        ctx.beginPath();
        ctx.arc(displayX - 10, this.y, this.radius - 4, 0, Math.PI * 2);
        ctx.arc(displayX + 10, this.y, this.radius - 4, 0, Math.PI * 2);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
        ctx.fillRect(displayX - 32, this.y - 12, 64, 24);

        ctx.fillStyle = '#000000';
        ctx.font = 'bold 20px "Comic Neue", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.word, displayX, this.y + 2);
        ctx.restore();
    }

    update() {
        this.y += UNIFORM_SPEED;
        if (this.isShaking) {
            this.shakeTimer -= 16;
            if (this.shakeTimer <= 0) {
                this.isShaking = false;
                this.flashRed = false;
            }
        }
    }
}

class Particle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;
        this.radius = Math.random() * 4 + 2;
        this.alpha = 1;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = '#ff3d00';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 0.02;
    }
}

function spawnApple() {
    if (gameOver) return;
    const lane = Math.floor(Math.random() * LANES);
    if (laneLastSpawnY[lane] < 150) return; 
    const isTarget = Math.random() < 0.4;
    const word = isTarget ? targetWord : words[Math.floor(Math.random() * words.length)];
    const newApple = new Apple(word, lane);
    apples.push(newApple);
    laneLastSpawnY[lane] = 0;
}

function getAccuracy() {
    const total = correctTaps + incorrectTaps;
    if (total === 0) return 100;
    return Math.round((correctTaps / total) * 100);
}

function updateDOMHUD() {
    document.getElementById('timer-text').textContent = `Timer: ${timeLeft}s`;
    document.getElementById('score-text').textContent = `Hits: ${correctTaps} | Wrong: ${incorrectTaps}`;
    
    const acc = getAccuracy();
    const accText = document.getElementById('accuracy-text');
    accText.textContent = `Accuracy: ${acc}% (Need 90%)`;
    accText.style.color = acc >= 90 ? '#4ade80' : '#f87171';
}

function drawUI() {
    // Clean Target box positioned natively in canvas bottom-left corner
    let boxW = 140;
    let boxH = 54;
    let boxX = 20;
    let boxY = canvas.height - boxH - 20;

    ctx.save();
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#52a447';
    ctx.lineWidth = 4;
    ctx.lineJoin = 'round';
    ctx.fillRect(boxX, boxY, boxW, boxH);
    ctx.strokeRect(boxX, boxY, boxW, boxH);

    // Displays strictly lowercase target word text cleanly inside the box
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 32px "Comic Neue", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(targetWord.toLowerCase(), boxX + boxW / 2, boxY + boxH / 2 + 2);
    ctx.restore();
}

function drawEndScreen() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 50px "Comic Neue", sans-serif';
    ctx.textAlign = 'center';
     
    if (gameWon) {
        ctx.fillStyle = '#4eff4e';
        ctx.fillText("🎉 Orchard Master Wins! 🎉", canvas.width / 2, canvas.height / 2 - 20);
    } else {
        ctx.fillStyle = '#ff4e4e';
        ctx.fillText("Try Again!", canvas.width / 2, canvas.height / 2 - 20);
    }
    ctx.fillStyle = '#ffffff';
    ctx.font = '30px "Comic Neue", sans-serif';
    ctx.fillText(`Final Accuracy: ${getAccuracy()}%`, canvas.width / 2, canvas.height / 2 + 40);
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
     
    drawOrchardBackground();

    for (let i = 0; i < LANES; i++) {
        laneLastSpawnY[i] = 9999;
    }
    for (let i = apples.length - 1; i >= 0; i--) {
        let apple = apples[i];
        apple.update();
        apple.draw();
        if (apple.y < laneLastSpawnY[apple.lane]) {
            laneLastSpawnY[apple.lane] = apple.y;
        }
        if (apple.y > canvas.height + apple.radius) {
            apples.splice(i, 1);
        }
    }
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].alpha <= 0) particles.splice(i, 1);
    }
    drawUI();
    if (gameOver) {
        drawEndScreen();
    } else {
        requestAnimationFrame(gameLoop);
    }
}

function handleInput(clientX, clientY) {
    initAudio(); 
    if (gameOver) return;

    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;

    for (let i = apples.length - 1; i >= 0; i--) {
        let apple = apples[i];
        let dist = Math.sqrt((x - apple.x) ** 2 + (y - apple.y) ** 2);
        if (dist <= apple.radius + 10) { 
            if (apple.word === targetWord) {
                correctTaps++;
                speakWord(targetWord); 
                for (let p = 0; p < 15; p++) {
                    particles.push(new Particle(apple.x, apple.y));
                }
                apples.splice(i, 1);
            } else {
                if (!apple.isShaking) {
                    incorrectTaps++;
                    playIncorrectSound(); 
                    apple.isShaking = true;
                    apple.shakeTimer = 500;
                    apple.flashRed = true;
                }
            }
            break; 
        }
    }
    updateDOMHUD();
}

canvas.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY));
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    handleInput(touch.clientX, touch.clientY);
}, { passive: false });

function restartGame() {
    initAudio(); 
    clearInterval(gameInterval);
    clearInterval(timerInterval);

    const rawInput = document.getElementById('wordList').value;
    words = rawInput.split(',').map(w => w.trim().toLowerCase()).filter(w => w.length > 0);
    if (words.length === 0) words = ['the'];
     
    targetWord = words[Math.floor(Math.random() * words.length)];
    setTimeout(() => { speakWord(targetWord); }, 100);

    timeLeft = 60;
    correctTaps = 0;
    incorrectTaps = 0;
    apples = [];
    particles = [];
    gameOver = false;
    gameWon = false;
    laneLastSpawnY = Array(LANES).fill(9999);

    gameInterval = setInterval(spawnApple, 1100); 
    startUkuleleMusic(); 

    resizeCanvas();
    updateDOMHUD();

    timerInterval = setInterval(() => {
        timeLeft--;
        updateDOMHUD();
        if (timeLeft <= 0) {
            gameOver = true;
            gameWon = getAccuracy() >= 90;
            clearInterval(timerInterval);
            clearInterval(gameInterval);
            clearInterval(musicInterval);
            if (gameWon) {
                playWinSound();
            } else {
                playLoseSound();
            }
        }
    }, 1000);

    requestAnimationFrame(gameLoop);
}

window.onload = function() {
    restartGame();
};
</script>

</body>
</html>
